<app-dialog 
    dialogTitle="Resetowanie hasła" 
    dialogHint="Wprowadź nowe hasło" 
    [dialogOpen]="dialogOpen()" 
    (closeDialog)="closeDialog()" 
    [isReady]="isResetReady()" 
    [errorMessage]="errorMessage()">

    <input autocomplete="off" placeholder="Nowe hasło" [value]="resetReadyPassword()" (input)="updateResetReadyPassword($event)">
    <input autocomplete="off" placeholder="Powtórz hasło" [value]="resetReadyRepeatPassword()" (input)="updateResetReadyRepeatPassword($event)">

</app-dialog>

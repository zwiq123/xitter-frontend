<div id="login-screen-main">
    <div>
        <h1>Nie jesteś zalogowany</h1>
        <button type="button" (click)="openRegister1Dialog()">Utwórz konto</button>
        <p>Masz już konto?</p>
        <!-- <a class="black" routerLink="login">Zaloguj się</a> -->
        <button class="black" type="button" (click)="openLoginDialog()">Zaloguj się</button>
    </div>
    <div>
        <img alt="logo" src="/logo.svg" width="250" id="logo">
    </div>
</div>

<div id="dialog-background" [class.open]="dialogOpen()">
    <div id="login-dialog" class="dialog" [class.open]="loginDialogOpen()">
        <div class="dialog-header">
            <svg class="back-icon" (click)="closeDialog()">
                <path fill="white" d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"></path>
            </svg>
            <img alt="logo" src="/logo.svg">
        </div>
        <div class="dialog-body">
            <h2>Zaloguj się</h2>
            <input placeholder="Nazwa użytkownika" [value]="loginUsername()" (input)="updateLoginUsername($event)">
            <input placeholder="Hasło" type="password" [value]="loginPassword()" (input)="updateLoginPassword($event)">
            <p class="error" [class.off]="loginErrorMessage() == ''">
                <svg width="16" height="16" fill="rgba(239, 68, 68)" viewBox="0 0 24 24">
                    <path fillrule="evenodd" d="M9.40228 3.50031C10.557 1.50055 13.4429 1.50055 14.5976 3.50031L22.3925 17.0003C23.547 19.0003 22.1032 21.5003 19.7939 21.5003H4.20599C1.8967 21.5003 0.452936 19.0003 1.60736 17.0003L9.40228 3.50031ZM11.998 15.2005C11.3354 15.2005 10.798 15.7372 10.7978 16.3997C10.7978 17.0625 11.3352 17.5999 11.998 17.5999C12.6606 17.5998 13.1982 17.0624 13.1982 16.3997C13.198 15.7372 12.6605 15.2006 11.998 15.2005ZM11.6035 8.50031C11.0118 8.50031 10.5495 9.01123 10.6083 9.59992L10.998 13.5003H12.998L13.3876 9.59992C13.4465 9.01123 12.9841 8.50031 12.3925 8.50031H11.6035Z"></path>
                </svg>
                {{loginErrorMessage()}}
            </p>
            <button type="button" class="stripped">Zapomniałeś hasła?</button>
        </div>
        <div class="dialog-footer">
            <button type="button" class="bottom" [disabled]="loginPassword() != '' && loginUsername() != '' ? false : true">Kontynuuj</button>
        </div>
    </div>

    <div id="register-dialog1" class="dialog" [class.open]="registerDialog1Open()">
        <div class="dialog-header">
            <svg class="back-icon" (click)="closeDialog()">
                <path fill="white" d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"></path>
            </svg>
            <img alt="logo" src="/logo.svg">
        </div>
        <div class="dialog-body">
            <h2>Zarejestruj się</h2>
            <input autocomplete="off" placeholder="Email" type="email" [value]="registerEmail()" (input)="updateRegisterEmail($event)">
            <input autocomplete="off" placeholder="Hasło" type="password" [value]="registerPassword()" (input)="updateRegisterPassword($event)">
            <input autocomplete="off" placeholder="Powtórz hasło" type="password" [value]="registerRepeatPassword()" (input)="updateRegisterRepeatPasword($event)">
            <p class="error" [class.off]="registerStepOneErrorMessage() == ''">
                <svg width="16" height="16" fill="rgba(239, 68, 68)" viewBox="0 0 24 24">
                    <path fillrule="evenodd" d="M9.40228 3.50031C10.557 1.50055 13.4429 1.50055 14.5976 3.50031L22.3925 17.0003C23.547 19.0003 22.1032 21.5003 19.7939 21.5003H4.20599C1.8967 21.5003 0.452936 19.0003 1.60736 17.0003L9.40228 3.50031ZM11.998 15.2005C11.3354 15.2005 10.798 15.7372 10.7978 16.3997C10.7978 17.0625 11.3352 17.5999 11.998 17.5999C12.6606 17.5998 13.1982 17.0624 13.1982 16.3997C13.198 15.7372 12.6605 15.2006 11.998 15.2005ZM11.6035 8.50031C11.0118 8.50031 10.5495 9.01123 10.6083 9.59992L10.998 13.5003H12.998L13.3876 9.59992C13.4465 9.01123 12.9841 8.50031 12.3925 8.50031H11.6035Z"></path>
                </svg>
                {{registerStepOneErrorMessage()}}
            </p>
        </div>
        <div class="dialog-footer">
            <button type="button" class="bottom" [disabled]="!isRegisterStepOneReady()" (click)="openRegister2Dialog()">Kontynuuj</button>
        </div>
    </div>

    <div id="register-dialog2" class="dialog" [class.open]="registerDialog2Open()">
        <div class="dialog-header">
            <svg class="back-icon" (click)="closeRegister2Dialog()">
                <path fill="white" d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"></path>
            </svg>
            <img alt="logo" src="/logo.svg">
        </div>
        <div class="dialog-body">
            <h2>Dokończ rejestrację</h2>
            <input autocomplete="off" placeholder="Nazwa użytkownika" [value]="registerUsername()" (input)="updateRegisterUsername($event)">
            <input type="file" (input)="updateRegisterImageUrl($event)" id="fileinput">
            <p>Zdjęcie profilowe</p>
            <label for="fileinput">Wybierz plik</label>
            <p>{{registerImageFilename()}}</p>
            <p class="error" [class.off]="registerStepTwoErrorMessage() == ''">
                <svg width="16" height="16" fill="rgba(239, 68, 68)" viewBox="0 0 24 24">
                    <path fillrule="evenodd" d="M9.40228 3.50031C10.557 1.50055 13.4429 1.50055 14.5976 3.50031L22.3925 17.0003C23.547 19.0003 22.1032 21.5003 19.7939 21.5003H4.20599C1.8967 21.5003 0.452936 19.0003 1.60736 17.0003L9.40228 3.50031ZM11.998 15.2005C11.3354 15.2005 10.798 15.7372 10.7978 16.3997C10.7978 17.0625 11.3352 17.5999 11.998 17.5999C12.6606 17.5998 13.1982 17.0624 13.1982 16.3997C13.198 15.7372 12.6605 15.2006 11.998 15.2005ZM11.6035 8.50031C11.0118 8.50031 10.5495 9.01123 10.6083 9.59992L10.998 13.5003H12.998L13.3876 9.59992C13.4465 9.01123 12.9841 8.50031 12.3925 8.50031H11.6035Z"></path>
                </svg>
                {{registerStepTwoErrorMessage()}}
            </p>
        </div>
        <div class="dialog-footer">
            <button type="button" class="bottom" [disabled]="!isRegisterStepOneReady()">Kontynuuj</button>
        </div>
    </div>
</div>

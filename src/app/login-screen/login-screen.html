<div id="login-screen-main">
    <div>
        <h1>Nie jesteś zalogowany</h1>
        <button type="button" (click)="openRegisterStepOneDialog()">Utwórz konto</button>
        <p>Masz już konto?</p>
        <button class="black" type="button" (click)="openLoginDialog()">Zaloguj się</button>
    </div>
    <div>
        <img alt="logo" src="/logo.svg" width="250" id="logo">
    </div>
</div>

<app-dialog
    dialogTitle="Zaloguj się" 
    [dialogOpen]="loginDialogOpen()" 
    (closeDialog)="closeDialog()"
    (continueClick)="logIn()" 
    [isReady]="isLoginReady()" 
    [errorMessage]="loginErrorMessage()">

    <input placeholder="Nazwa użytkownika" [value]="loginUsername()" (input)="updateLoginUsername($event)">
    <input placeholder="Hasło" type="password" [value]="loginPassword()" (input)="updateLoginPassword($event)">
    <button type="button" class="stripped" (click)="openResetDialog()">Zapomniałeś hasła?</button> 

</app-dialog>

<app-dialog
    dialogTitle="Zarejestruj się" 
    [dialogOpen]="registerStepOneDialogOpen()" 
    (closeDialog)="closeDialog()"
    (continueClick)="openRegisterStepTwoDialog()"
    [isReady]="isRegisterStepOneReady() ?? false" 
    [errorMessage]="registerStepOneErrorMessage()">
    
    <input autocomplete="off" placeholder="E-mail" type="email" [value]="registerEmail()" (input)="updateRegisterEmail($event)">
    <input autocomplete="off" placeholder="Hasło" type="password" [value]="registerPassword()" (input)="updateRegisterPassword($event)">
    <input autocomplete="off" placeholder="Powtórz hasło" type="password" [value]="registerRepeatPassword()" (input)="updateRegisterRepeatPasword($event)">

</app-dialog>


<app-dialog
    dialogTitle="Dokończ rejestrację" 
    [dialogOpen]="registerStepTwoDialogOpen()" 
    (closeDialog)="closeRegisterStepTwoDialog()" 
    (continueClick)="createAccount()"
    [isReady]="isRegisterStepTwoReady()" 
    [errorMessage]="registerStepTwoErrorMessage()">

    <input autocomplete="off" placeholder="Nazwa użytkownika" [value]="registerUsername()" (input)="updateRegisterUsername($event)">
    <input type="file" (input)="updateRegisterImageUrl($event)" id="fileinput" accept=".png,.jpg,.webp,.svg,.gif,.jpeg">
    <p class="hint" [style.textAlign]="'center'">Ustaw zdjęcie profilowe</p>
    <label for="fileinput">Wybierz plik</label>
    <img alt="profilepic" [src]="registerImageUrl()" width="120" height="120" class="profilepic">

</app-dialog>

<app-dialog
    dialogTitle="Znajdź swoje konto" 
    dialogHint="Wprowadź swój adres e-mail lub nazwę użytkownika, aby zresetować hasło." 
    [dialogOpen]="resetDialogOpen()" 
    (closeDialog)="closeResetDialog()" 
    [isReady]="false" 
    [errorMessage]="resetErrorMessage()">

    <input autocomplete="off" placeholder="E-mail lub nazwa użytkownika" [value]="resetEmailOrUsername()" (input)="updateResetEmailOrUsername($event)">

</app-dialog>

<div class="dialog-background" [class.open]="finishDialogOpen()">
    <div class="dialog">
        <div class="dialog-header">
            <svg class="back-icon" (click)="closeDialog()">
                <path fill="white" d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"></path>
            </svg>
            <img alt="logo" src="/logo.svg">
        </div>
        <div class="dialog-body">
            <h2>Udało się!</h2>
            <p class="hint">Sprawdź maila w celu potwierdzenia założenia konta.</p>
        </div>
    </div>
</div>

<main>
  @if (!loggedIn()) {
    <app-login-screen (clickLogin)="clickLogin()" (updateAccessToken)="setAccessToken($event)"></app-login-screen>
  } @else {
    <app-main-page [loggedInUUID]="loggedInUUID()" (clickLogout)="clickLogout()"></app-main-page>
  }
  <router-outlet></router-outlet>
</main>
